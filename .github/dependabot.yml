version: 2
updates:
  # Python deps: batch minor/patch into one weekly PR; majors stay individual
  # (so a major like azure-functions 1.x -> 2.x gets its own focused review).
  - package-ecosystem: "pip"
    directory: "/function_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions bumps are low-risk; batch them all (incl. major tag bumps).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
